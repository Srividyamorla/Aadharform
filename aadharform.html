<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aadhaar Update Form</title>
<link rel="stylesheet" href="style1.css">
</head>
<body>

<div class="container">
    <div class="header">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSifj4ccld0tZXl5e7uYQOLyyCBJJS-NfmDolAqQwIO7A&s=10" alt="Aadhaar Logo"/>
        <h2>Aadhaar Update Form</h2>
        <p>Update your Aadhaar Details</p>
    </div>
    <form>
        <label>🆔 Aadhaar Number</label>
        <input type="text" placeholder="Enter Aadhaar Number" maxlength="12">

        <label>👤 Full Name</label>
        <input type="text" placeholder="Enter Full Name">

        <label>📱 Mobile Number</label>
        <input type="tel" placeholder="Enter Mobile Number" maxlength="10">

        <label>📧 Email ID</label>
        <input type="email" placeholder="Enter Email">

        <label>📅 Date of Birth</label>
        <input type="date">

        <label>⚧ Gender</label>
        <select>
            <option>Select Gender</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
        </select>

        <label>Update Required</label>

        <div class="checkbox-group">
            <label><input type="checkbox">Name</label>
            <label><input type="checkbox">Address</label>
            <label><input type="checkbox">Mobile</label>
            <label><input type="checkbox">Email</label>
        </div>

        <label>📝 New Name</label>
        <input type="text" placeholder="Enter New Name">

        <label>🏠 New Address</label>
        <textarea rows="4" placeholder="Enter New Address"></textarea>

        <label>📞 New Mobile Number</label>
        <input type="tel" placeholder="Enter New Mobile Number" maxlength="10">

        <label>📩 New Email</label>
        <input type="email" placeholder="Enter New Email">

        <label>📂 Upload Proof</label>
        <input type="file">

        <div class="buttons">
            <button type="submit">Submit</button>
            <button type="reset">Reset</button>
        </div>

    </form>

</div>

</body>
</html>
